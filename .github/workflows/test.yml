name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # config.py 의 get_env_or_default 가 ValueError 를 던지지 않도록
    # 더미 자격 증명을 주입한다. 실제 KIS/Telegram 연결은
    # pytest.ini 의 default addopts `-m "not integration and not manual"` 로 차단된다.
    env:
      KIS_ACCOUNT_NO_JY_Investing1: "ci-dummy-acct-1"
      KIS_APP_KEY_JY1: "ci-dummy-key-1"
      KIS_APP_SECRET_JY1: "ci-dummy-secret-1"
      TELEGRAM_BOT_TOKEN_JY_Investing1: "ci-dummy-bot-1"
      KIS_ACCOUNT_NO_JY_Investing2: "ci-dummy-acct-2"
      KIS_APP_KEY_JY2: "ci-dummy-key-2"
      KIS_APP_SECRET_JY2: "ci-dummy-secret-2"
      TELEGRAM_BOT_TOKEN_JY_Investing2: "ci-dummy-bot-2"
      TELEGRAM_ADMIN_BOT_TOKEN: "ci-dummy-admin-bot"
      TELEGRAM_ADMIN_CHAT_ID: "ci-dummy-admin-chat"
      # RUN_INTEGRATION_TESTS 는 의도적으로 비워둠 (실연결 차단)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache TA-Lib C library
        id: cache-talib
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/libta_lib*
            /usr/include/ta-lib
          key: talib-c-0.6.4-${{ runner.os }}

      - name: Install TA-Lib C library
        if: steps.cache-talib.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          wget -q https://github.com/ta-lib/ta-lib/releases/download/v0.6.4/ta-lib-0.6.4-src.tar.gz
          tar -xzf ta-lib-0.6.4-src.tar.gz
          cd ta-lib-0.6.4
          ./configure --prefix=/usr
          make -j"$(nproc)"
          sudo make install

      - name: Refresh shared library cache
        run: sudo ldconfig

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest --tb=short -q
