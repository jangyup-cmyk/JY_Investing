<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JY 투자클럽 대시보드</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <header class="header">
            <div class="brand">
                <h1>JY INVEST<span class="dot">.</span></h1>
                <p class="subtitle">AI Automated Trading System</p>
            </div>
            <div class="status-indicator">
                <div class="pulse-ring"></div>
                <div class="pulse-dot"></div>
                <span>시스템 정상 가동 중</span>
            </div>
        </header>

        <!-- 설정 정보 요약 -->
        <section class="config-section glass-card">
            <div class="config-grid" id="config-container">
                <!-- JS 로 로드 -->
                <div class="config-item"><span class="label">모니터링 종목:</span> <span class="value">로딩중...</span></div>
                <div class="config-item"><span class="label">손절 설정:</span> <span class="value">로딩중...</span></div>
                <div class="config-item"><span class="label">익절 설정:</span> <span class="value">로딩중...</span></div>
            </div>
        </section>

        <!-- 메인 메트릭 (잔고) -->
        <section class="metrics-grid" id="balance-container">
            <!-- JS로 로드됨 -->
            <div class="glass-card metric-card">
                <h3>로딩 중...</h3>
                <div class="value">₩ 0</div>
            </div>
        </section>

        <div class="main-content">
            <!-- 보유 포지션 테이블 -->
            <section class="positions-section glass-card">
                <div class="section-header">
                    <h2>📊 보유 포지션</h2>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>계좌명</th>
                                <th>종목명 (코드)</th>
                                <th>매수가</th>
                                <th>보유수량</th>
                                <th>손절가</th>
                                <th>익절가</th>
                                <th>진입시간</th>
                            </tr>
                        </thead>
                        <tbody id="positions-body">
                            <!-- JS 로드 -->
                            <tr><td colspan="7" class="text-center">로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 실시간 시스템 로그 -->
            <section class="logs-section glass-card">
                <div class="section-header">
                    <h2>⚡ 시스템 로그</h2>
                    <button id="refresh-logs-btn" class="btn-icon">↻</button>
                </div>
                <div class="log-container" id="log-container">
                    <!-- JS 로드 -->
                    <div class="log-entry">로딩 중...</div>
                </div>
            </section>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
